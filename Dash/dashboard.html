<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Hotel Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./dash.css">

  <!-- Firebase (nodig voor auth/profile) -->
  <script type="module" src="./auth-guard.js"></script>
  <script type="module" src="./profile-ui.js"></script>
</head>

<body>

  <header class="topbar">
    <h1>Hotel Dashboard</h1>

    <div id="profileBtn">
      <img id="userAvatar" src="https://i.imgur.com/6VBx3io.png">
    </div>
  </header>

  <main class="dashboard">
    <button class="card">Rooms</button>
    <button class="card">Restaurants</button>
    <button class="card">Activities</button>
  </main>

  <!-- Profile modal -->
  <div id="profileModal" class="modal hidden">
    <div class="modal-content">
      <h2>Profile Settings</h2>

      <input id="firstName" placeholder="Voornaam">
      <input id="lastName" placeholder="Achternaam">
      <input id="birthDate" type="date">
      <input id="photoURL" placeholder="Foto URL">

      <select id="language">
        <option value="nl">Nederlands</option>
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
      </select>

      <button id="saveProfile">Opslaan</button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

</body>
</html>
