<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Hotel Dashboard</title>

  <link rel="stylesheet" href="dashboard.css">

  <script type="module" src="firebase.js"></script>
  <script type="module" src="authGuard.js"></script>
</head>

<body>

<div class="bg-animation"></div>

<header class="topbar">
  <div class="logo">HOTEL CONTROL</div>

  <div class="top-right">
    <div id="clock"></div>
    <img id="avatar" class="avatar" src="https://i.imgur.com/6VBx3io.png">
  </div>
</header>

<div class="container">

  <aside class="sidebar">
    <div class="nav-item">🏨 Rooms</div>
    <div class="nav-item">🍽 Restaurants</div>
    <div class="nav-item">🎯 Activities</div>
  </aside>

  <main class="main">

    <h1 id="welcomeText">Welkom</h1>

    <div class="card-grid">

      <div class="card">
        <h2>Rooms</h2>
        <p>Manage bookings & availability</p>
      </div>

      <div class="card">
        <h2>Restaurants</h2>
        <p>Menus & reservations</p>
      </div>

      <div class="card">
        <h2>Activities</h2>
        <p>Events & planning</p>
      </div>

    </div>

  </main>

</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal hidden">
  <div class="modal-content">
    <h2>Profile Settings</h2>

    <button id="themeBtn" class="gold-btn">🌗 Toggle Theme</button>
    <button id="logoutBtn" class="gold-btn logout-btn">🚪 Logout</button>

  </div>
</div>

<script type="module" src="dashboard.js"></script>
<script type="module" src="profile.js"></script>
<script type="module" src="theme.js"></script>

</body>
</html>
