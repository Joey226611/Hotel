<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="/Hotel/Dash/dashboard.css">

  <!-- Auth guard eerst laden -->
  <script type="module" src="/Hotel/Dash/firebase.js"></script>
  <script type="module" src="/Hotel/Dash/authGuard.js"></script>
</head>

<body>

<header class="navbar">
  <h1 class="logo">MyDashboard</h1>
  <div class="profile-area">
    <img id="profilePic" src="https://i.pravatar.cc/100">
  </div>
</header>

<main class="main">
  <h2 class="welcome">Welkom 👋</h2>

  <div class="cards">
    <div class="card">🏨 Rooms</div>
    <div class="card">🍽 Restaurants</div>
    <div class="card">🎯 Activities</div>
  </div>
</main>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal hidden">
  <div class="modal-content">
    <h2>Profile Settings</h2>

    <label>Voornaam</label>
    <input id="firstName">

    <label>Achternaam</label>
    <input id="lastName">

    <label>Geboortedatum</label>
    <input type="date" id="birthDate">

    <label>Profielfoto</label>
    <input type="file" id="photoUpload">

    <label>Taal</label>
    <select id="language">
      <option>Nederlands</option>
      <option>English</option>
    </select>

    <label>Thema</label>
    <select id="themeToggle">
      <option value="dark">Dark</option>
      <option value="light">Light</option>
    </select>

    <button id="saveProfile">Opslaan</button>
    <button id="logoutBtn">Uitloggen</button>
  </div>
</div>

<!-- Scripts onderaan -->
<script type="module" src="/Hotel/Dash/dashboard.js"></script>
<script type="module" src="/Hotel/Dash/profileModal.js"></script>
<script type="module" src="/Hotel/Dash/theme.js"></script>

</body>
</html>
